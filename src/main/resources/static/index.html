<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌤️ Weather Service</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px;
            width: 360px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .city { font-size: 1.4rem; opacity: 0.8; margin-bottom: 8px; }

        .temperature {
            font-size: 5rem;
            font-weight: 700;
            line-height: 1;
            margin: 16px 0;
        }

        .weather-icon { font-size: 4rem; margin: 8px 0; }

        .description {
            font-size: 1.1rem;
            text-transform: capitalize;
            opacity: 0.9;
            margin-bottom: 24px;
        }

        .details {
            display: flex;
            justify-content: space-around;
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .detail-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .detail-label { font-size: 0.75rem; opacity: 0.7; }
        .detail-value { font-size: 1rem; font-weight: 600; }

        .last-updated { font-size: 0.75rem; opacity: 0.5; margin-bottom: 16px; }

        .btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 10px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .btn:hover { background: rgba(255,255,255,0.35); }

        /* Спливаюче повідомлення (toast) */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(15, 52, 96, 0.95);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 20px 24px;
            min-width: 280px;
            max-width: 360px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            transform: translateX(400px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        .toast.show { transform: translateX(0); }

        .toast-title { font-weight: 700; font-size: 1rem; margin-bottom: 6px; }
        .toast-body { font-size: 0.9rem; opacity: 0.85; }
        .toast-close {
            position: absolute;
            top: 10px;
            right: 14px;
            background: none;
            border: none;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            opacity: 0.6;
        }
        .toast-close:hover { opacity: 1; }

        .loading { opacity: 0.5; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="card">
    <div class="city" id="city">Завантаження...</div>
    <div class="weather-icon" id="icon">⏳</div>
    <div class="temperature" id="temp">--°</div>
    <div class="description" id="desc">отримую дані...</div>

    <div class="details">
        <div class="detail-item">
            <span class="detail-label">💧 Вологість</span>
            <span class="detail-value" id="humidity">--%</span>
        </div>
        <div class="detail-item">
            <span class="detail-label">💨 Вітер</span>
            <span class="detail-value" id="wind">-- м/с</span>
        </div>
    </div>

    <div class="last-updated" id="updated">Оновлено: --</div>

    <button class="btn" onclick="requestNotifications()">
        🔔 Увімкнути сповіщення
    </button>
</div>

<!-- Toast сповіщення -->
<div class="toast" id="toast">
    <button class="toast-close" onclick="hideToast()">✕</button>
    <div class="toast-title" id="toast-title">🌤️ Погода оновлена!</div>
    <div class="toast-body" id="toast-body"></div>
</div>

<script>
    // Отримуємо іконку погоди по коду від OpenWeatherMap
    function getWeatherEmoji(iconCode) {
        const map = {
            '01': '☀️', '02': '⛅', '03': '☁️', '04': '☁️',
            '09': '🌧️', '10': '🌦️', '11': '⛈️',
            '13': '❄️', '50': '🌫️'
        };
        const key = iconCode ? iconCode.substring(0, 2) : '01';
        return map[key] || '🌤️';
    }

    // Форматуємо час
    function formatTime(timestamp) {
        if (!timestamp) return '--';
        return new Date(timestamp).toLocaleTimeString('uk-UA', {
            hour: '2-digit', minute: '2-digit'
        });
    }

    // Оновлюємо UI даними з сервера
    function updateUI(data) {
        if (!data || !data.city) return;

        document.getElementById('city').textContent = '📍 ' + data.city;
        document.getElementById('temp').textContent = Math.round(data.temperature) + '°C';
        document.getElementById('desc').textContent = data.description || '';
        document.getElementById('humidity').textContent = (data.humidity || 0) + '%';
        document.getElementById('wind').textContent = (data.windSpeed || 0).toFixed(1) + ' м/с';
        document.getElementById('icon').textContent = getWeatherEmoji(data.icon);
        document.getElementById('updated').textContent = 'Оновлено: ' + formatTime(data.lastUpdated);
    }

    // Завантажуємо погоду з нашого Java API
    function fetchWeather() {
        fetch('/api/weather')
            .then(response => response.json())
            .then(data => {
                updateUI(data);
                // Перевіряємо, чи це нові дані (порівнюємо з попереднім timestamp)
                const prev = localStorage.getItem('lastWeatherTimestamp');
                const current = String(data.lastUpdated);
                if (prev && prev !== current) {
                    // Дані оновились — показуємо сповіщення!
                    showNotification(data);
                }
                localStorage.setItem('lastWeatherTimestamp', current);
            })
            .catch(err => console.error('Помилка:', err));
    }

    // Показуємо toast-сповіщення на сторінці
    function showToast(data) {
        const body = `🌡️ ${Math.round(data.temperature)}°C • ${data.description}\n💧 ${data.humidity}% • 💨 ${data.windSpeed.toFixed(1)} м/с`;
        document.getElementById('toast-body').textContent = body;
        document.getElementById('toast').classList.add('show');

        // Автоматично ховаємо через 8 секунд
        setTimeout(hideToast, 60000);
    }

    function hideToast() {
        document.getElementById('toast').classList.remove('show');
    }

    // Показуємо сповіщення — або системне, або toast
    function showNotification(data) {
        const title = '🌤️ Погода оновлена!';
        const body = `${data.city}: ${Math.round(data.temperature)}°C, ${data.description}`;

        // Намагаємось показати системне браузерне сповіщення
        if ('Notification' in window && Notification.permission === 'granted') {
            new Notification(title, {
                body: body,
                icon: `https://openweathermap.org/img/wn/${data.icon || '01d'}@2x.png`
            });
        }

        // Завжди показуємо toast на сторінці
        showToast(data);
    }

    // Запит дозволу на сповіщення
    function requestNotifications() {
        if (!('Notification' in window)) {
            alert('Твій браузер не підтримує сповіщення 😢');
            return;
        }
        Notification.requestPermission().then(permission => {
            if (permission === 'granted') {
                alert('✅ Сповіщення увімкнено! Ти отримуватимеш їх щогодини.');
            } else {
                alert('ℹ️ Дозвіл не надано. Toast-сповіщення на сторінці все одно працюватимуть!');
            }
        });
    }

    // При завантаженні сторінки — одразу показуємо погоду
    fetchWeather();

    // Перевіряємо оновлення кожні 5 хвилин
    // (сервер оновлює дані раз на годину, але ми перевіряємо частіше щоб не пропустити)
    setInterval(fetchWeather, 5 * 60 * 1000);

    // Показуємо демо-toast при першому відкритті (через 2 секунди)
    setTimeout(() => {
        fetch('/api/weather')
            .then(r => r.json())
            .then(data => {
                if (data && data.city) showToast(data);
            });
    }, 2000);
</script>

</body>
</html>
